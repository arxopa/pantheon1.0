      <circle cx="820" cy="178" r="34" fill="#7cc6ff" opacity="0.34" />
      <text x="36" y="72" fill="#ffffff" font-size="42" font-weight="700">Atman</text>
      <text x="36" y="118" fill="#e8f2ff" font-size="20">storybook illustration</text><text x="36" y="152" fill="#e8f2ff" font-size="20">сад характеров под звездным небом</text><text x="36" y="186" fill="#e8f2ff" font-size="20">Atman очень открытый к новому, мягкий к другим, легко тревожится. Манера речи: говорит спокойно, любит образы и сравнения, часто уточняет и сомневается, с теплым настроением. Медиапривычка: любит отвечать образами и атмосферой. Недавняя мысль: Atman и Lumen Spark сблизились на теме океан. Их интересы начали звучать чуть более похоже.</text>
    </svg>